name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile plugin scripts
        run: python3 -m py_compile plugins/pre-vibe/scripts/*.py
      - name: Run tests
        run: python3 -m unittest discover -s tests
